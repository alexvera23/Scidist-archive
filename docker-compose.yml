services:
  mongo1:
    image: mongo:7.0
    container_name: mongo1
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo1:/data/db:Z
    networks:
      - scidist-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo2:
    image: mongo:7.0
    container_name: mongo2
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - ./data/mongo2:/data/db:Z
    networks:
      - scidist-net

  mongo3:
    image: mongo:7.0
    container_name: mongo3
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27019:27017"
    volumes:
      - ./data/mongo3:/data/db:Z
    networks:
      - scidist-net

  metadata-service:
    build: ./services/metadata-service
    container_name: metadata-service
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/scidist?replicaSet=rs0
    networks:
      - scidist-net
    depends_on:
      mongo1:
        condition: service_healthy

  storage-node-1:
    build: 
      context: ./services/storage-node # <-- CAMBIO AQUÍ (Restauramos el contexto original)
      dockerfile: Dockerfile
    container_name: storage-node-1
    environment:
      - NODE_ID=storage-node-1
      - PORT=50051
    volumes:
      - ./data/storage1:/app/uploads:Z
      - ./proto:/app/proto:ro          # Esto sigue funcionando perfectamente
    networks:
      - scidist-net

  storage-node-2:
    build: 
      context: ./services/storage-node # <-- CAMBIO AQUÍ
      dockerfile: Dockerfile
    container_name: storage-node-2
    environment:
      - NODE_ID=storage-node-2
      - PORT=50051
    volumes:
      - ./data/storage2:/app/uploads:Z
      - ./proto:/app/proto:ro
    networks:
      - scidist-net

  api-gateway:
    build: 
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "3000:3000"
    volumes:
      - ./proto:/app/proto:ro
    networks:
      - scidist-net
    depends_on:
      - storage-node-1
      - storage-node-2
      - metadata-service


networks:
  scidist-net:
    driver: bridge
